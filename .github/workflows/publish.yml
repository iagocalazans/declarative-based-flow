name: 📦 Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🔄 Sync version from release tag
        run: |
          # Extract version from release tag (removes 'v' prefix if present)
          RELEASE_VERSION="${{ github.event.release.tag_name }}"
          VERSION="${RELEASE_VERSION#v}"

          echo "📌 Release tag: $RELEASE_VERSION"
          echo "📦 Package version: $VERSION"

          # Update package.json version
          npm version $VERSION --no-git-tag-version --allow-same-version

          echo "✅ Version synced successfully"

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build package
        run: npm run build

      - name: 🔍 Verify package contents
        run: |
          echo "📋 Package contents:"
          npm pack --dry-run

      - name: 🚀 Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: ✅ Success notification
        run: |
          echo "🎉 Successfully published declarative-based-flow@${{ github.event.release.tag_name }} to npm!"
          echo "📦 View on npm: https://www.npmjs.com/package/declarative-based-flow"
